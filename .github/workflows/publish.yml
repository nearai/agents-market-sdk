name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Build packages
        run: |
          npm run build --workspace=packages/market-react
          npm run build --workspace=packages/market-embed

      - name: Publish @agents-market/market
        run: npm publish --workspace=packages/market --access=public        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @agents-market/market-react
        run: npm publish --workspace=packages/market-react --access=public        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @agents-market/market-embed
        run: npm publish --workspace=packages/market-embed --access=public        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
